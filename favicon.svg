<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ruvn — graded evidence stamp">
  <!-- Hand-authored DOSSIER mark: a warm paper square with a forest-green
       grade-A rubber stamp and an oxblood casefile corner. Deliberately NOT
       the MetaHarness molten-amber 'MH' coin. -->
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fbf6ea"/>
      <stop offset="100%" stop-color="#efe5d2"/>
    </linearGradient>
  </defs>
  <!-- paper field -->
  <rect width="32" height="32" rx="6" fill="url(#paper)" stroke="#d8c9a8" stroke-width="1"/>
  <!-- oxblood casefile spine on the left edge -->
  <rect x="0" y="0" width="4" height="32" rx="2" fill="#9e2b25"/>
  <!-- dog-eared corner -->
  <path d="M24 4 L28 4 L28 8 Z" fill="#e3d2ad"/>
  <!-- forest-green 'A' grade stamp, rotated like a struck stamp -->
  <g transform="rotate(-8 18 18)">
    <rect x="9" y="9" width="18" height="16" rx="3" fill="none" stroke="#3f6b3a" stroke-width="2"/>
    <text x="18" y="22.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-weight="800" font-size="14" fill="#3f6b3a">A</text>
  </g>
  <!-- tiny green check -->
  <path d="M22.5 11.5 l1.6 1.6 l3-3.4" fill="none" stroke="#3f6b3a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
